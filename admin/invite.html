<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>管理者招待の確認｜簿記2級 仕訳トレーニング</title>
<style>
  :root{--primary:#1a5fb4; --primary-dark:#14497f; --bg:#f4f6f9; --card:#fff; --text:#22303d; --sub:#6b7a89; --line:#dbe2ea; --err:#b91c1c; --ok:#166534;}
  *{box-sizing:border-box;}
  body{font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; background:var(--bg); color:var(--text); line-height:1.7; margin:0; padding:18px;}
  .wrap{max-width:680px; margin:0 auto;}
  header{background:var(--primary); color:#fff; border-radius:12px; padding:16px 18px; margin-bottom:14px;}
  h1{font-size:1.15rem; margin:0;}
  p{margin:8px 0;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:14px;}
  .label{font-size:.82rem; color:var(--sub); margin-top:10px;}
  .value{font-size:1.05rem; font-weight:700; color:var(--primary-dark);}
  .muted{color:var(--sub); font-size:.9rem;}
  .err{color:var(--err); font-weight:700;}
  .ok{color:var(--ok); font-weight:700;}
  .warn-box{border:1px solid #f3c66d; background:#fff7e6; color:#6b4a00; border-radius:8px; padding:10px 12px; margin-top:16px; font-size:.92rem;}
  label{display:block; font-size:.85rem; font-weight:700; margin:14px 0 4px;}
  input{width:100%; font-family:inherit; font-size:16px; padding:10px; border:1px solid var(--line); border-radius:8px;}
  button,a.button{display:inline-block; border:0; text-decoration:none; background:var(--primary); color:#fff; border-radius:8px; padding:10px 16px; font-weight:700; margin-top:12px; cursor:pointer; font-family:inherit; font-size:.95rem;}
  button:hover,a.button:hover{background:var(--primary-dark);}
  button:disabled{opacity:.55; cursor:default;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>管理者招待の確認</h1>
    <p>簿記2級 仕訳トレーニング｜管理者ダッシュボード</p>
  </header>
  <div class="card">
    <p>メールアドレス・権限・担当大学が正しいことを確認してください。</p>
    <div class="label">メールアドレス</div>
    <div class="value" id="email-view">確認中...</div>
    <div class="label">権限</div>
    <div class="value" id="role-view">確認中...</div>
    <div class="label">担当大学</div>
    <div class="value" id="univ-view">確認中...</div>
    <div class="warn-box">
      担当大学が違う場合は、パスワード設定メールを送らず、マスター管理者へ連絡してください。正しい担当大学で確認リンクを再発行してもらってください。
    </div>
    <div id="confirm-area" style="display:none">
      <button id="send-password-mail-btn">内容を確認してパスワード設定メールを送る</button>
    </div>
    <div id="reset-area" style="display:none">
      <label for="password-input">新しいパスワード</label>
      <input id="password-input" type="password" autocomplete="new-password" placeholder="6文字以上">
      <label for="password-confirm-input">新しいパスワード（確認）</label>
      <input id="password-confirm-input" type="password" autocomplete="new-password" placeholder="もう一度入力">
      <button id="set-password-btn">担当大学を確認してパスワードを設定</button>
    </div>
    <p id="msg" class="muted" style="margin-top:14px"></p>
    <a id="dashboard-link" class="button" href="./" style="display:none">管理者ダッシュボードを開く</a>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, verifyPasswordResetCode, confirmPasswordReset, applyActionCode, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyC29p0TS5K8FFs4s0ICxRrcOSLdXOnwIII",
  authDomain: "boki-shiwake-app.firebaseapp.com",
  projectId: "boki-shiwake-app"
};
const app = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const ADMIN_URL = "https://urutoraktiti-boop.github.io/boki-shiwake-app/admin/";
const params = new URLSearchParams(location.search);
const mode = params.get("mode") || "";
const code = params.get("oobCode") || "";
const continueParams = paramsFromContinueUrl(params.get("continueUrl"));
const getParam = name => params.get(name) || continueParams.get(name) || "";
const esc = s => String(s || "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
const $ = id => document.getElementById(id);

function paramsFromContinueUrl(url) {
  try { return new URL(url || "").searchParams; } catch (e) { return new URLSearchParams(); }
}
function setText(id, value) {
  $(id).innerHTML = esc(value || "未指定");
}
function roleLabel(role) {
  return role === "master" ? "マスター管理者" : "大学別管理者";
}
function showMsg(text, cls="muted") {
  $("msg").className = cls;
  $("msg").textContent = text;
}
function authErrorMessage(e) {
  const code = e.code || "";
  if (code === "auth/expired-action-code") return "リンクの有効期限が切れています。マスター管理者に確認リンクの再発行を依頼してください。";
  if (code === "auth/invalid-action-code") return "リンクが無効です。最新の確認リンクから開いてください。";
  if (code === "auth/weak-password") return "パスワードが短すぎます。6文字以上で設定してください。";
  if (code === "auth/user-not-found") return "このメールアドレスの管理者アカウントが見つかりません。マスター管理者に確認リンクの再発行を依頼してください。";
  if (code === "auth/too-many-requests") return "短時間に送信が続いたため、一時的に制限されています。少し時間を置いてからもう一度お試しください。";
  return e.message || code || "処理に失敗しました。";
}

async function init() {
  const role = getParam("role") || "univ";
  const univ = getParam("univ") || "";
  setText("role-view", roleLabel(role));
  setText("univ-view", role === "master" ? "全大学" : univ);
  if (mode === "resetPassword" && code) {
    try {
      const email = await verifyPasswordResetCode(auth, code);
      setText("email-view", email);
      $("reset-area").style.display = "";
      showMsg("担当大学が正しければ、新しいパスワードを入力してください。違う場合は設定せず、管理者へ連絡してください。");
    } catch (e) {
      setText("email-view", getParam("email") || "");
      showMsg(authErrorMessage(e), "err");
    }
    return;
  }
  if (mode === "verifyEmail" && code) {
    try {
      await applyActionCode(auth, code);
      setText("email-view", getParam("email") || "");
      showMsg("メール確認が完了しました。管理者ダッシュボードへログインしてください。", "ok");
      $("dashboard-link").style.display = "inline-block";
    } catch (e) {
      showMsg(authErrorMessage(e), "err");
    }
    return;
  }
  setText("email-view", getParam("email") || "");
  if (getParam("email") || getParam("univ") || getParam("role")) {
    $("confirm-area").style.display = "";
    showMsg("内容が正しければ、パスワード設定メールを送ってください。担当大学が違う場合は送信せず、マスター管理者へ連絡してください。");
    return;
  }
  showMsg("メール内の最新リンクから開いてください。", "err");
}

$("send-password-mail-btn").onclick = async () => {
  const email = getParam("email");
  if (!email || !email.includes("@")) { showMsg("メールアドレスを確認できません。マスター管理者に確認リンクの再発行を依頼してください。", "err"); return; }
  $("send-password-mail-btn").disabled = true;
  showMsg("パスワード設定メールを送信しています...");
  try {
    await sendPasswordResetEmail(auth, email, {
      url: ADMIN_URL,
      handleCodeInApp: false
    });
    $("confirm-area").style.display = "none";
    showMsg("パスワード設定メールを送信しました。メール内のリンクでパスワードを設定し、その後、管理者ダッシュボードへログインしてください。", "ok");
    $("dashboard-link").style.display = "inline-block";
  } catch (e) {
    $("send-password-mail-btn").disabled = false;
    showMsg(authErrorMessage(e), "err");
  }
};

$("set-password-btn").onclick = async () => {
  const p1 = $("password-input").value;
  const p2 = $("password-confirm-input").value;
  if (p1.length < 6) { showMsg("パスワードは6文字以上で入力してください。", "err"); return; }
  if (p1 !== p2) { showMsg("確認用パスワードが一致しません。", "err"); return; }
  $("set-password-btn").disabled = true;
  showMsg("パスワードを設定しています...");
  try {
    await confirmPasswordReset(auth, code, p1);
    $("reset-area").style.display = "none";
    $("dashboard-link").style.display = "inline-block";
    showMsg("パスワードを設定しました。管理者ダッシュボードへログインしてください。", "ok");
  } catch (e) {
    $("set-password-btn").disabled = false;
    showMsg(authErrorMessage(e), "err");
  }
};

init();
</script>
</body>
</html>
